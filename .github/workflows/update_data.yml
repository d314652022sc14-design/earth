name: Auto Fetch Satellite Data

# 觸發條件
on:
  schedule:
    # 使用 Cron 語法：代表「每 6 小時的第 0 分鐘」自動執行一次
    - cron: '0 */6 * * *' 
  workflow_dispatch: # 加上這行，允許我們在 GitHub 網頁上手動點擊測試按鈕

jobs:
  update-data:
    runs-on: ubuntu-latest # 在 GitHub 的虛擬 Linux 主機上執行
    permissions:
      contents: write # 🚨 授權機器人可以把新檔案寫入/覆蓋你的儲存庫

    steps:
    - name: 📥 1. 取得目前儲存庫的檔案
      uses: actions/checkout@v3

    - name: 🐍 2. 安裝 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 3. 安裝 Requests 套件
      run: pip install requests

    - name: 🚀 4. 執行抓取資料腳本
      run: python fetch_satellites.py

    - name: 💾 5. 提交並推送到 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add satellites.json
        # 邏輯判斷：如果 satellites.json 內容有改變，就 commit 並 push；如果沒變就不理它，避免報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動更新：最新衛星軌道資料 (TLE)" && git push)
